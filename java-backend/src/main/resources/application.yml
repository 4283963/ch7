spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/rainwell
    username: rainwell
    password: rainwell123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

mqtt:
  broker: tcp://127.0.0.1:1883
  client-id: rainwell-backend
  topic-water-level: rainwell/water_level
  topic-control-cmd: rainwell/control/cmd
  topic-control-ack: rainwell/control/ack

balance:
  high-threshold: 450
  low-threshold: 150
  diff-threshold: 200
  check-interval-ms: 3000

server:
  port: 8080
